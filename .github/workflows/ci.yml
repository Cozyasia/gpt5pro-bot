name: Production CI

on:
  push:
    branches: [main, "prod/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip -q
          pip install -r requirements.txt -q
      - name: Compile all Python modules
        run: python -m compileall -q .
      - name: Reproduce Celebrity Selfie entry
        env:
          PROD_HARDENING_ENABLED: "0"
          PYTHONPATH: "."
        run: python tools/diag_celebrity_open.py
      - name: Upload Celebrity Selfie diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: celebrity-selfie-open-diagnostic
          path: celebrity-diagnostic.txt
          if-no-files-found: error
      - name: Run production core tests
        env:
          PROD_HARDENING_ENABLED: "0"
        run: |
          set +e
          python -m unittest discover -s tests -v > production-test-output.txt 2>&1
          status=$?
          cat production-test-output.txt
          exit $status
      - name: Upload production test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-test-output
          path: production-test-output.txt
          if-no-files-found: error
