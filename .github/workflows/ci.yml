name: Production CI

on:
  push:
    branches: [main, "prod/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile all Python modules
        run: python -m compileall -q .
      - name: Reproduce Celebrity Selfie reference preparation
        env:
          PROD_HARDENING_ENABLED: "0"
          PYTHONPATH: "."
        run: python tools/diag_celebrity_refs.py
      - name: Upload Celebrity Selfie reference diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: celebrity-selfie-reference-diagnostic
          path: celebrity-refs-diagnostic.json
          if-no-files-found: error
      - name: Run production core tests
        env:
          PROD_HARDENING_ENABLED: "0"
        run: python -m unittest discover -s tests -v
