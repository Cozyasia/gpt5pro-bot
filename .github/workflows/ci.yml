name: Production CI

on:
  push:
    branches: [main, "prod/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip -q
          pip install -r requirements.txt -q
      - name: Compile all Python modules
        run: python -m compileall -q .
      - name: Reproduce Celebrity Selfie entry
        env:
          PROD_HARDENING_ENABLED: "0"
        run: python -m unittest tests.test_celebrity_selfie_v128_runtime_open -v
      - name: Run production core tests
        env:
          PROD_HARDENING_ENABLED: "0"
        run: python -m unittest discover -s tests -v
