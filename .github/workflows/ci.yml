name: Production CI

on:
  push:
    branches: [main, "prod/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile all Python modules
        run: python -m compileall -q .
      - name: Run production core tests
        env:
          PROD_HARDENING_ENABLED: "0"
        run: |
          set -o pipefail
          python -m unittest discover -s tests -v 2>&1 | tee v133-test-output.txt
      - name: Upload v133 test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v133-test-output
          path: v133-test-output.txt
          if-no-files-found: error
