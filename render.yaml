services:
  - type: web
    name: gpt5pro-bot
    env: python
    plan: starter
    autoDeploy: true

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: bash -lc "python -u main.py"

    disk:
      name: bot-data
      mountPath: /data
      sizeGB: 1

    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: LOG_LEVEL
        value: INFO
      - key: TZ
        value: Asia/Bangkok

      - key: BOT_TOKEN
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: PUBLIC_URL
        sync: false
      - key: WEBAPP_URL
        sync: false
      - key: USE_WEBHOOK
        value: "1"
      - key: WEBHOOK_PATH
        value: /tg
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false

      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: openai/gpt-4o-mini
      - key: OPENAI_BASE_URL
        sync: false
      - key: TEXT_PROVIDER
        value: openrouter
      - key: OPENROUTER_SITE_URL
        sync: false
      - key: OPENROUTER_APP_NAME
        value: GPT-5 PRO Bot

      - key: LIVE_SEARCH_ENABLED
        value: "1"
      - key: LIVE_SEARCH_TIMEOUT_S
        value: "18"
      - key: TAVILY_API_KEY
        sync: false
      - key: CRYPTO_RATE_ENABLED
        value: "1"
      - key: BINANCE_MARKET_BASE
        value: https://api.binance.com

      - key: OPENAI_IMAGE_KEY
        sync: false
      - key: OPENAI_IMAGE_BASE_URL
        value: https://api.openai.com/v1
      - key: OPENAI_TTS_KEY
        sync: false
      - key: OPENAI_TTS_MODEL
        value: gpt-4o-mini-tts
      - key: OPENAI_TTS_VOICE
        value: alloy
      - key: OPENAI_STT_KEY
        sync: false
      - key: OPENAI_TRANSCRIBE_MODEL
        value: whisper-1
      - key: DEEPGRAM_API_KEY
        sync: false

      - key: COMET_API_KEY
        sync: false
      - key: COMET_BRIA_API_KEY
        sync: false
      - key: COMET_BASE_URL
        value: https://api.cometapi.com
      - key: COMET_OPENAI_BASE_URL
        value: https://api.cometapi.com/v1

      # v51 Comet background remove/replace: strict /v1/responses only by default.
      - key: BG_PROVIDER
        value: comet
      - key: COMET_BG_MODEL
        value: bria/remove-background
      - key: COMET_BG_MODEL_CANDIDATES
        value: bria/remove-background,replicate/bria/remove-background
      - key: COMET_BG_REMOVE_PATH
        value: /v1/responses
      - key: COMET_BG_REMOVE_PATHS
        value: /v1/responses
      - key: COMET_BG_STATUS_PATH
        value: /v1/responses/{id}
      - key: COMET_BG_STATUS_PATHS
        value: /v1/responses/{id}
      - key: COMET_BG_TIMEOUT_S
        value: "180"
      - key: COMET_BG_POLL_DELAY_S
        value: "3"
      - key: COMET_BG_MAX_WAIT_S
        value: "180"
      - key: COMET_BG_USE_TELEGRAM_URL
        value: "0"
      - key: COMET_BG_DEBUG_TO_CHAT
        value: "1"
      - key: COMET_BG_ALLOW_REPLICATE
        value: "0"
      - key: COMET_ALLOW_BRIA_COMPAT_ROUTES
        value: "0"
      - key: LOCAL_REMBG_ENABLED
        value: "0"
      - key: BRIA_ALLOW_LOCAL_FALLBACK
        value: "0"

      # v51 Bria increase-resolution through Comet responses.
      - key: COMET_UPSCALE_MODEL
        value: bria/increase-resolution
      - key: COMET_UPSCALE_MODEL_CANDIDATES
        value: bria/increase-resolution,replicate/bria/increase-resolution
      - key: COMET_UPSCALE_PATHS
        value: /v1/responses
      - key: COMET_UPSCALE_STATUS_PATHS
        value: /v1/responses/{id}
      - key: COMET_UPSCALE_DEFAULT_FACTOR
        value: "2"
      - key: COMET_UPSCALE_TIMEOUT_S
        value: "240"
      - key: COMET_UPSCALE_POLL_DELAY_S
        value: "3"
      - key: COMET_UPSCALE_MAX_WAIT_S
        value: "240"
      - key: COMET_UPSCALE_USE_TELEGRAM_URL
        value: "0"
      - key: COMET_UPSCALE_DEBUG_TO_CHAT
        value: "1"
      - key: COMET_UPSCALE_ALLOW_REPLICATE
        value: "0"

      - key: RUNWAY_ENABLED
        value: "1"
      - key: RUNWAY_USE_COMET
        value: "1"
      - key: RUNWAY_MODEL
        value: gen3a_turbo
      - key: RUNWAY_RATIO
        value: 720:1280
      - key: RUNWAY_DURATION_S
        value: "5"
      - key: RUNWAY_COMET_CREATE_PATH
        value: /runwayml/v1/image_to_video
      - key: RUNWAY_COMET_STATUS_PATH
        value: /runwayml/v1/tasks/{id}
      - key: RUNWAY_MAX_WAIT_S
        value: "1200"
      - key: VIDEO_POLL_DELAY_S
        value: "6.0"

      - key: KLING_ENABLED
        value: "1"
      - key: KLING_MODEL
        value: kling-v1-6
      - key: KLING_CREATE_PATH
        value: /kling/v1/videos/image2video
      - key: KLING_STATUS_PATH
        value: /kling/v1/videos/image2video/{id}
      - key: KLING_TEXT_CREATE_PATH
        value: /kling/v1/videos/text2video
      - key: KLING_TEXT_STATUS_PATH
        value: /kling/v1/videos/text2video/{id}
      - key: KLING_UNIT_COST_USD
        value: "0.80"

      - key: SORA_ENABLED
        value: "0"
      - key: SORA_MODEL
        value: sora-2
      - key: SORA_CREATE_PATH
        value: /v1/videos
      - key: SORA_STATUS_PATH
        value: /v1/videos/{id}
      - key: SORA_UNIT_COST_USD
        value: "0.15"
      - key: SORA_PRO_UNIT_COST_USD
        value: "0.30"

      - key: AUTO_ENGINE_ENABLED
        value: "1"
      - key: REELS_STUDIO_ENABLED
        value: "1"
      - key: REELS_DEFAULT_ASPECT
        value: 9:16
      - key: REELS_DEFAULT_DURATION_S
        value: "20"
      - key: REELS_SCENE_DURATION_S
        value: "5"
      - key: REELS_MAX_PHOTOS
        value: "12"
      - key: REELS_AUTO_POST
        value: "1"

      - key: SEEDANCE_ENABLED
        value: "1"
      - key: SEEDANCE_MODEL
        value: doubao-seedance-2-0-fast
      - key: SEEDANCE_CREATE_PATH
        value: /v1/videos
      - key: SEEDANCE_STATUS_PATH
        value: /v1/videos/{id}
      - key: SEEDANCE_UNIT_COST_USD
        value: "0.25"
      - key: SEEDANCE_AUTO_FIRST
        value: "0"
      - key: VEO_ENABLED
        value: "0"
      - key: HAILUO_ENABLED
        value: "0"
      - key: VIDU_ENABLED
        value: "0"
      - key: GROK_VIDEO_ENABLED
        value: "0"
      - key: LUMA_ENABLED
        value: "0"
      - key: LUMA_API_KEY
        sync: false
      - key: SUNO_ENABLED
        value: "0"

      - key: YOOKASSA_PROVIDER_TOKEN
        sync: false
      - key: PROVIDER_TOKEN_YOOKASSA
        sync: false
      - key: YOOKASSA_CURRENCY
        value: RUB
      - key: CRYPTO_PAY_API_TOKEN
        sync: false
      - key: DB_PATH
        value: /data/subs.db
      - key: OWNER_ID
        sync: false
      - key: UNLIM_USER_IDS
        sync: false
      - key: UNLIM_USERNAMES
        value: gpt5pro_support
      - key: USD_RUB
        value: "100"
