services:
  - type: web
    name: gpt5pro-bot
    env: python
    plan: starter
    autoDeploy: true

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: bash -lc "python -u main.py"

    disk:
      name: bot-data
      mountPath: /data
      sizeGB: 1

    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: LOG_LEVEL
        value: INFO
      - key: TZ
        value: Asia/Bangkok

      - key: BOT_TOKEN
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: PUBLIC_URL
        sync: false
      - key: WEBAPP_URL
        sync: false
      - key: TARIFF_URL
        sync: false
      - key: USE_WEBHOOK
        value: "1"
      - key: WEBHOOK_PATH
        value: /tg
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false

      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_BASE_URL
        sync: false
      - key: TEXT_PROVIDER
        sync: false
      - key: OPENROUTER_SITE_URL
        sync: false
      - key: OPENROUTER_APP_NAME
        value: Neuro-Bot GPT-5

      # Live internet / search
      - key: LIVE_SEARCH_ENABLED
        value: "1"
      - key: LIVE_SEARCH_TIMEOUT_S
        value: "18"
      - key: TAVILY_API_KEY
        sync: false
      - key: OPENAI_WEB_SEARCH_MODEL
        value: gpt-4o-mini-search-preview
      - key: CRYPTO_RATE_ENABLED
        value: "1"
      - key: BINANCE_MARKET_BASE
        value: https://api.binance.com

      - key: OPENAI_IMAGE_KEY
        sync: false
      - key: OPENAI_TTS_KEY
        sync: false
      - key: OPENAI_TTS_MODEL
        value: gpt-4o-mini-tts
      - key: OPENAI_TTS_VOICE
        value: alloy

      # BRIA background remove / replace (primary provider for photo background tools)
      - key: BG_PROVIDER
        value: bria
      - key: BRIA_API_KEY
        sync: false
      - key: BRIA_REMOVE_BG_URL
        value: https://engine.prod.bria-api.com/v2/image/edit/remove_background
      - key: BRIA_REPLACE_BG_URL
        value: https://engine.prod.bria-api.com/v2/image/edit/replace_background
      - key: BRIA_REPLACE_BG_MODE
        value: high_control
      - key: BRIA_SYNC
        value: "1"
      - key: BRIA_ALLOW_LOCAL_FALLBACK
        value: "1"

      - key: DEEPGRAM_API_KEY
        sync: false
      - key: OPENAI_STT_KEY
        sync: false
      - key: OPENAI_TRANSCRIBE_MODEL
        value: whisper-1

      - key: COMET_API_KEY
        sync: false
      - key: COMET_BASE_URL
        value: https://api.cometapi.com
      - key: RUNWAY_USE_COMET
        value: "1"
      - key: RUNWAY_MODEL
        value: gen3a_turbo
      - key: RUNWAY_RATIO
        value: 720:1280
      - key: RUNWAY_DURATION_S
        value: "5"
      - key: SORA_ENABLED
        value: "0"
      - key: SORA_MODEL
        value: sora-2
      - key: SORA_UNIT_COST_USD
        value: "0.15"
      - key: SORA_PRO_UNIT_COST_USD
        value: "0.30"
      - key: KLING_ENABLED
        value: "1"
      - key: KLING_MODEL
        value: kling-v1-6
      - key: KLING_UNIT_COST_USD
        value: "0.80"
      - key: AUTO_ENGINE_ENABLED
        value: "1"
      - key: REELS_STUDIO_ENABLED
        value: "1"
      - key: REELS_DEFAULT_ASPECT
        value: 9:16
      - key: REELS_DEFAULT_DURATION_S
        value: "20"
      - key: REELS_SCENE_DURATION_S
        value: "5"
      - key: REELS_MAX_PHOTOS
        value: "12"
      - key: REELS_AUTO_POST
        value: "1"
      - key: RUNWAY_ENABLED
        value: "1"
      - key: SEEDANCE_ENABLED
        value: "1"
      - key: SEEDANCE_MODEL
        value: doubao-seedance-2-0-fast
      - key: SEEDANCE_CREATE_PATH
        value: /v1/videos
      - key: SEEDANCE_STATUS_PATH
        value: /v1/videos/{id}
      - key: SEEDANCE_UNIT_COST_USD
        value: "0.25"
      - key: SEEDANCE_AUTO_FIRST
        value: "0"
      - key: VEO_ENABLED
        value: "0"
      - key: VEO_MODEL
        value: veo3.1_fast
      - key: HAILUO_ENABLED
        value: "0"
      - key: VIDU_ENABLED
        value: "0"
      - key: GROK_VIDEO_ENABLED
        value: "0"
      - key: SUNO_ENABLED
        value: "0"

      # Luma временно не показывается и не используется
      - key: LUMA_API_KEY
        sync: false

      - key: YOOKASSA_PROVIDER_TOKEN
        sync: false
      - key: CRYPTO_PAY_API_TOKEN
        sync: false
      - key: DB_PATH
        value: /data/subs.db
      - key: OWNER_ID
        sync: false
      - key: UNLIM_USER_IDS
        sync: false
      - key: UNLIM_USERNAMES
        value: gpt5pro_support
      - key: USD_RUB
        value: "100"
