  - key: BOT_PUBLIC_NAME
    value: Neuro-Bot GPT-5 Pro
  - key: BOT_SHORT_DESCRIPTION
    value: 'Мультимодельный нейро-бот: GPT, Images, Runway, Sora 2, Kling, Suno, Deepgram, Photoroom, FaceSwap — в одном Telegram.'
  - key: BOT_DESCRIPTION
    value: Neuro-Bot GPT-5 Pro — мультимодельный ИИ-бот для учёбы, работы, медицины и контента. Умеет GPT-чат, PDF/DOCX, фото,
      речь, изображения, говорящий аватар, фото→видеоклип с музыкой, клип с вокалом для 1 человека, видео по тексту/голосу,
      Suno, презентации, PDF-каталоги, логотипы, фон и FaceSwap.
