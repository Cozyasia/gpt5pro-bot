services:
- type: web
  name: gpt5pro-bot
  env: python
  plan: starter
  autoDeploy: true
  buildCommand: 'pip install --upgrade pip

    pip install -r requirements.txt

    '
  startCommand: bash -lc "python -u main.py"
  disk:
    name: bot-data
    mountPath: /data
    sizeGB: 1
  envVars:
