services:
  - type: web
    name: gpt5pro-bot
    env: python
    plan: starter
    autoDeploy: true

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: bash -lc "python -u main.py"

    disk:
      name: bot-data
      mountPath: /data
      sizeGB: 1

    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: LOG_LEVEL
        value: INFO
      - key: TZ
        value: Asia/Bangkok

      - key: BOT_TOKEN
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: PUBLIC_URL
        sync: false
      - key: WEBAPP_URL
        sync: false
      - key: TARIFF_URL
        sync: false
      - key: USE_WEBHOOK
        value: "1"
      - key: WEBHOOK_PATH
        value: /tg
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false

      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_BASE_URL
        sync: false
      - key: TEXT_PROVIDER
        sync: false
      - key: OPENROUTER_SITE_URL
        sync: false
      - key: OPENROUTER_APP_NAME
        value: Neuro-Bot GPT-5

      # Live internet / search
      - key: LIVE_SEARCH_ENABLED
        value: "1"
      - key: LIVE_SEARCH_TIMEOUT_S
        value: "18"
      - key: TAVILY_API_KEY
        sync: false
      - key: OPENAI_WEB_SEARCH_MODEL
        value: gpt-4o-mini-search-preview
      - key: CRYPTO_RATE_ENABLED
        value: "1"
      - key: BINANCE_MARKET_BASE
        value: https://api.binance.com

      - key: OPENAI_IMAGE_KEY
        sync: false
      - key: OPENAI_TTS_KEY
        sync: false
      - key: OPENAI_TTS_MODEL
        value: gpt-4o-mini-tts
      - key: OPENAI_TTS_VOICE
        value: alloy

      - key: DEEPGRAM_API_KEY
        sync: false
      - key: OPENAI_STT_KEY
        sync: false
      - key: OPENAI_TRANSCRIBE_MODEL
        value: whisper-1

      - key: COMET_API_KEY
        sync: false
      - key: COMET_BASE_URL
        value: https://api.cometapi.com
      - key: RUNWAY_USE_COMET
        value: "1"
      - key: RUNWAY_MODEL
        value: gen3a_turbo
      - key: RUNWAY_TASK_NOT_EXIST_FALLBACK_S
        value: "90"
      - key: RUNWAY_AUTO_FALLBACK_KLING
        value: "1"
      - key: RUNWAY_RATIO
        value: 720:1280
      - key: RUNWAY_DURATION_S
        value: "8"
      - key: SORA_ENABLED
        value: "1"
      - key: SORA_MODEL
        value: sora-2
      - key: SORA_UNIT_COST_USD
        value: "0.15"
      - key: SORA_PRO_UNIT_COST_USD
        value: "0.30"
      - key: KLING_ENABLED
        value: "1"
      - key: KLING_MODEL
        value: kling-v1-6
      - key: KLING_UNIT_COST_USD
        value: "0.80"

      # Background remove / replace: Comet/Bria first, local rembg fallback
      - key: BG_PROVIDER
        value: local-only
      - key: BG_COMET_MODEL
        value: bria/remove-background
      - key: BG_COMET_REMOVE_PATH
        value: /v1/images/edits
      - key: BG_REMOVE_TIMEOUT_S
        value: "90"
      - key: BRIA_API_KEY
        sync: false
      - key: BRIA_BASE_URL
        value: https://engine.prod.bria-api.com
      - key: BRIA_REMOVE_PATH
        value: /v1/background/remove
      - key: BRIA_ALLOW_LOCAL_FALLBACK
        value: "1"
      - key: LOCAL_REMBG_ENABLED
        value: "1"
      - key: REMBG_MODEL
        value: u2netp
      - key: U2NET_HOME
        value: /data/.u2net
      - key: LOCAL_REMBG_TIMEOUT_S
        value: "240"
      - key: BG_LOCAL_FIRST
        value: "1"
      - key: REMBG_MAX_SIDE
        value: "1600"
      - key: REMBG_MODEL_FALLBACKS
        value: u2netp
      - key: XDG_CACHE_HOME
        value: /data/.cache
      - key: OMP_NUM_THREADS
        value: "1"

      # Luma временно не показывается и не используется
      - key: LUMA_API_KEY
        sync: false

      - key: YOOKASSA_PROVIDER_TOKEN
        sync: false
      - key: CRYPTO_PAY_API_TOKEN
        sync: false
      - key: DB_PATH
        value: /data/subs.db
      - key: OWNER_ID
        sync: false
      - key: UNLIM_USER_IDS
        sync: false
      - key: UNLIM_USERNAMES
        value: gpt5pro_support
      - key: USD_RUB
        value: "100"

      - key: VIDEO_RESULT_SEND_AS_DOCUMENT
        value: "1"
      - key: VIDEO_RESULT_DEDUPE_TTL_S
        value: "900"
      - key: SORA_AUTO_FALLBACK_KLING
        value: "1"
