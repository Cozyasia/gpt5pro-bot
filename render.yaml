services:
  - type: web
    name: gpt5pro-bot
    env: python
    plan: starter
    autoDeploy: true

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: bash -lc "python -u main.py"

    disk:
      name: bot-data
      mountPath: /data
      sizeGB: 1

    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: LOG_LEVEL
        value: INFO
      - key: TZ
        value: Asia/Bangkok

      - key: BOT_TOKEN
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: AUTO_SET_BOT_PROFILE
        value: "1"
      - key: BOT_PUBLIC_NAME
        value: Neuro-Bot GPT-5 Pro
      - key: BOT_SHORT_DESCRIPTION
        value: GPT-5, Images, Sora 2, Kling, Runway, Midjourney, Suno, Deepgram, Photoroom и FaceSwap — в одном Telegram-боте.
      - key: BOT_DESCRIPTION
        value: Neuro-Bot GPT-5 Pro — мультимодельный ИИ-бот для учёбы, работы, медицины и контента. Умеет GPT-чат, PDF/DOCX, фото и скриншоты, анализ МРТ/КТ/анализов, речь, изображения, видео, музыку Suno, презентации, PDF-каталоги, логотипы, фон и FaceSwap. Выберите режим или напишите задачу.
      - key: PUBLIC_URL
        sync: false
      - key: WEBAPP_URL
        sync: false
      - key: TARIFF_URL
        sync: false
      - key: USE_WEBHOOK
        value: "1"
      - key: WEBHOOK_PATH
        value: /tg
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false

      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_BASE_URL
        sync: false
      - key: TEXT_PROVIDER
        sync: false
      - key: OPENROUTER_SITE_URL
        sync: false
      - key: OPENROUTER_APP_NAME
        value: Neuro-Bot GPT-5

      # Live internet / search
      - key: LIVE_SEARCH_ENABLED
        value: "1"
      - key: LIVE_SEARCH_TIMEOUT_S
        value: "18"
      - key: TAVILY_API_KEY
        sync: false
      - key: OPENAI_WEB_SEARCH_MODEL
        value: gpt-4o-mini-search-preview
      - key: CRYPTO_RATE_ENABLED
        value: "1"
      - key: BINANCE_MARKET_BASE
        value: https://api.binance.com

      - key: OPENAI_IMAGE_KEY
        sync: false
      - key: OPENAI_TTS_KEY
        sync: false
      - key: OPENAI_TTS_MODEL
        value: gpt-4o-mini-tts
      - key: OPENAI_TTS_VOICE
        value: alloy
      - key: TTS_VOICE_CAPTION
        value: "0"
      - key: STT_ECHO_TRANSCRIPT
        value: "0"
      - key: CHAT_MEMORY_ENABLED
        value: "1"
      - key: CHAT_MEMORY_MAX_MESSAGES
        value: "16"
      - key: CHAT_MEMORY_MAX_CHARS
        value: "6000"
      - key: CHAT_MEMORY_TTL_DAYS
        value: "30"

      - key: DEEPGRAM_API_KEY
        sync: false
      - key: OPENAI_STT_KEY
        sync: false
      - key: OPENAI_TRANSCRIBE_MODEL
        value: whisper-1

      - key: COMET_API_KEY
        sync: false
      - key: COMET_BASE_URL
        value: https://api.cometapi.com
      - key: SUNO_ENABLED
        value: "1"
      - key: SUNO_API_KEY
        sync: false
      - key: SUNO_BASE_URL
        value: https://api.cometapi.com
      - key: SUNO_MODEL
        value: chirp-bluejay
      - key: SUNO_CREATE_PATH
        value: /suno/submit/music
      - key: SUNO_STATUS_PATH
        value: /suno/fetch/{id}
      - key: SUNO_COST_USD
        value: "0.20"
      - key: SUNO_BILLING_ENGINE
        value: runway
      - key: SUNO_TIMEOUT_S
        value: "600"
      - key: RUNWAY_USE_COMET
        value: "1"
      - key: RUNWAY_MODEL
        value: gen3a_turbo
      - key: RUNWAY_TASK_NOT_EXIST_FALLBACK_S
        value: "90"
      - key: RUNWAY_AUTO_FALLBACK_KLING
        value: "1"
      - key: RUNWAY_RATIO
        value: 720:1280
      - key: RUNWAY_DURATION_S
        value: "8"
      - key: SORA_ENABLED
        value: "1"
      - key: SORA_MODEL
        value: sora-2
      - key: SORA_UNIT_COST_USD
        value: "0.15"
      - key: SORA_PRO_UNIT_COST_USD
        value: "0.30"
      - key: KLING_ENABLED
        value: "1"
      - key: KLING_MODEL
        value: kling-v1-6
      - key: KLING_UNIT_COST_USD
        value: "0.80"
      - key: KLING_AVATAR_CREATE_PATH
        value: /kling/v1/videos/avatar/image2video
      - key: KLING_AVATAR_STATUS_PATH
        value: /kling/v1/videos/avatar/image2video/{id}
      - key: KLING_AVATAR_MODE
        value: std
      - key: KLING_AVATAR_PROMPT
        value: The person talks naturally to camera, realistic facial motion, accurate lip sync, subtle head movement, stable identity.
      - key: AVATAR_TTS_PROVIDER
        value: openai
      - key: OPENAI_TTS_BASE_URL
        value: https://api.openai.com/v1
      - key: TTS_MAX_CHARS
        value: "1000"
      - key: KLING_TTS_CREATE_PATH
        value: /kling/v1/audio/tts
      - key: KLING_TTS_STATUS_PATH
        value: /kling/v1/audio/tts/{id}
      - key: KLING_TTS_VOICE_ID
        value: genshin_vindi2
      - key: KLING_TTS_LANGUAGE
        value: en
      - key: KLING_TTS_SPEED
        value: "1.0"
      - key: PHOTO_CLIP_SOUND
        value: "1"
      - key: PHOTO_CLIP_MODE
        value: pro
      - key: SUNO_AUTO_FOR_PHOTO_CLIP
        value: "0"
      - key: AVATAR_UNIT_COST_USD
        value: "0.65"
      - key: PHOTO_CLIP_UNIT_COST_USD
        value: "0.80"
      - key: SUNO_UNIT_COST_USD
        value: "0.15"

      # Background remove / replace: production via Photoroom API
      - key: BG_DISABLE_LOCAL_REMBG
        value: "1"
      - key: BG_PROVIDER
        value: "photoroom-api-only"
      - key: PHOTOROOM_API_KEY
        sync: false
      - key: PHOTOROOM_BASE_URL
        value: https://sdk.photoroom.com
      - key: PHOTOROOM_REMOVE_PATH
        value: /v1/segment
      - key: PHOTOROOM_FORMAT
        value: png
      - key: PHOTOROOM_CHANNELS
        value: rgba
      - key: PHOTOROOM_SIZE
        value: hd
      - key: PHOTOROOM_CROP
        value: "false"
      - key: PHOTOROOM_DESPILL
        value: "false"
      - key: PHOTOROOM_TIMEOUT_S
        value: "70"
      # Optional legacy fallback, not required for production:
      - key: REMOVE_BG_API_KEY
        sync: false
      - key: REMOVE_BG_SIZE
        value: auto
      - key: REMOVE_BG_FORMAT
        value: png
      - key: REMOVE_BG_TIMEOUT_S
        value: "60"
      - key: BG_COMET_MODEL
        value: bria/remove-background
      - key: BG_COMET_REMOVE_PATH
        value: /v1/images/edits
      - key: BG_REMOVE_TIMEOUT_S
        value: "90"
      - key: BRIA_API_KEY
        sync: false
      - key: BRIA_BASE_URL
        value: https://engine.prod.bria-api.com
      - key: BRIA_REMOVE_PATH
        value: /v1/background/remove
      - key: BRIA_ALLOW_LOCAL_FALLBACK
        value: "1"
      - key: LOCAL_REMBG_ENABLED
        value: "0"
      - key: REMBG_MODEL
        value: u2netp
      - key: U2NET_HOME
        value: /tmp/.u2net
      - key: LOCAL_REMBG_TIMEOUT_S
        value: "240"
      - key: BG_LOCAL_FIRST
        value: "0"
      - key: REMBG_MAX_SIDE
        value: "1600"
      - key: REMBG_MODEL_FALLBACKS
        value: u2netp
      - key: XDG_CACHE_HOME
        value: /tmp/.cache
      - key: OMP_NUM_THREADS
        value: "1"

      # Luma временно не показывается и не используется
      - key: LUMA_API_KEY
        sync: false

      - key: YOOKASSA_PROVIDER_TOKEN
        sync: false
      - key: CRYPTO_PAY_API_TOKEN
        sync: false
      - key: DB_PATH
        value: /data/subs.db
      - key: OWNER_ID
        sync: false
      - key: UNLIM_USER_IDS
        sync: false
      - key: UNLIM_USERNAMES
        value: gpt5pro_support
      - key: USD_RUB
        value: "100"
      - key: FREE_TEXT_PER_DAY
        value: "10"
      - key: FREE_IMAGE_GENERATIONS_PER_DAY
        value: "1"
      - key: FREE_IMAGE_PROCESSINGS_PER_DAY
        value: "1"
      - key: IMG_PROCESS_COST_USD
        value: "0.05"

      - key: VIDEO_RESULT_SEND_AS_DOCUMENT
        value: "1"
      - key: VIDEO_RESULT_DEDUPE_TTL_S
        value: "900"
      - key: SORA_AUTO_FALLBACK_KLING
        value: "1"

      - key: BG_FORCE_LOCAL_REMBG
        value: "0"

      - key: LOCAL_REMBG_SUBPROCESS
        value: "0"

      - key: BG_ACTION_TIMEOUT_S
        value: "90"

      - key: PHOTOROOM_INPUT_MAX_SIDE
        value: "1600"
      - key: BG_OUTPUT_MAX_SIDE
        value: "1600"
      - key: BG_REALISTIC_BACKGROUNDS
        value: "1"
      - key: BG_BACKGROUND_TIMEOUT_S
        value: "12"
      - key: BG_CACHE_DIR
        value: "/tmp/bg_cache"

      # FaceSwap v35.0: precise target/source face choice + Segmind composite
      - key: FACESWAP_ENABLED
        value: "1"
      - key: FACESWAP_PROVIDER
        value: piapi
      - key: FACESWAP_FAST_PROVIDER
        value: piapi
      - key: FACESWAP_PREMIUM_PROVIDER
        value: segmind-v4
      - key: FACESWAP_FALLBACK_PROVIDER
        value: segmind-v2
      - key: FACESWAP_ASK_TARGET_FACE
        value: "1"
      - key: FACESWAP_ASK_SOURCE_FACE
        value: "1"
      - key: FACESWAP_STRICT_SELECTED_FACE
        value: "1"
      - key: FACESWAP_MANUAL_CHOICE_IF_DETECTION_FAIL
        value: "1"
      - key: FACESWAP_PRECISE_COMPOSITE
        value: "1"
      - key: FACESWAP_FORCE_SEGMIND_FOR_MULTI
        value: "1"
      - key: FACESWAP_GROUP_ALLOW_SEGMIND_FALLBACK
        value: "1"
      - key: FACESWAP_FACE_BOX_FILTER_RATIO
        value: "0.35"
      - key: FACESWAP_SOURCE_CROP_MARGIN
        value: "2.20"
      - key: FACESWAP_TARGET_HIDE_MARGIN
        value: "1.55"
      - key: FACESWAP_COMPOSITE_MARGIN_X
        value: "1.85"
      - key: FACESWAP_COMPOSITE_MARGIN_Y_UP
        value: "1.45"
      - key: FACESWAP_COMPOSITE_MARGIN_Y_DOWN
        value: "1.75"
      - key: FACESWAP_FACE_DETECTION_ENABLED
        value: "1"
      - key: FACESWAP_DETECTION_MAX_SIDE
        value: "1200"
      - key: FACESWAP_PREVIEW_MAX_SIDE
        value: "1200"
      - key: FACESWAP_FAST_COST_USD
        value: "0.03"
      - key: FACESWAP_PREMIUM_COST_USD
        value: "0.12"
      - key: FACESWAP_TIMEOUT_S
        value: "300"
      - key: FACESWAP_POLL_DELAY_S
        value: "2.5"
      - key: FACESWAP_INPUT_MAX_SIDE
        value: "1600"
      - key: FACESWAP_OUTPUT_MAX_SIDE
        value: "1600"
      - key: FACESWAP_RESULT_AS_DOCUMENT
        value: "0"
      - key: FACESWAP_IMAGE_DATA_URL
        value: "0"
      - key: PIAPI_API_KEY
        sync: false
      - key: PIAPI_BASE_URL
        value: https://api.piapi.ai
      - key: PIAPI_FACE_CREATE_PATH
        value: /api/v1/task
      - key: PIAPI_FACE_STATUS_PATH
        value: /api/v1/task/{task_id}
      - key: PIAPI_FACE_MODEL
        value: Qubico/image-toolkit
      - key: PIAPI_FACE_TASK_TYPE
        value: face-swap
      - key: SEGMIND_API_KEY
        sync: false
      - key: SEGMIND_BASE_URL
        value: https://api.segmind.com
      - key: SEGMIND_FACESWAP_MODEL_FAST
        value: faceswap-v2
      - key: SEGMIND_FACESWAP_MODEL_PREMIUM
        value: faceswap-v4
      - key: SEGMIND_FACE_RESTORE
        value: codeformer-v0.1.0.pth
      - key: SEGMIND_FACE_SWAP_TYPE
        value: head
      - key: SEGMIND_FACE_STYLE_TYPE
        value: normal
